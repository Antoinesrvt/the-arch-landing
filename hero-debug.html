<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Debug - The Arch Landing</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <style>
        .debug-info {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px;
            border-radius: 5px;
            z-index: 9999;
            font-family: monospace;
            font-size: 12px;
        }
        .debug-highlight {
            border: 2px solid red !important;
            background: rgba(255,0,0,0.1) !important;
        }
    </style>
</head>
<body>
    <div class="debug-info" id="debug-info">
        <div>Hero Section Debug</div>
        <div id="hero-status">Checking...</div>
    </div>

    <!-- Hero Section -->
    <section id="hero-section" class="relative overflow-hidden" aria-labelledby="hero-title">
        <div id="hero-canvas-container" aria-hidden="true">
            <canvas id="hero-canvas"></canvas>
        </div>
        <div class="container mx-auto px-6 hero-content flex items-center h-full">
            <div class="text-center lg:text-left max-w-2xl">
                <h1 id="hero-title" class="text-4xl md:text-5xl lg:text-6xl font-extrabold text-white leading-tight tracking-tighter" style="text-shadow: 0 2px 20px rgba(0,0,0,0.8);" data-lang-key="hero_title">
                    L'architecture de votre succès en Web3
                </h1>
                <p class="mt-6 text-lg md:text-xl text-secondary-text" style="text-shadow: 0 1px 10px rgba(0,0,0,0.7);" data-lang-key="hero_subtitle">
                    Nous fusionnons les expertises Tech, Finance et Communautaire pour bâtir des écosystèmes Web3 robustes et pérennes.
                </p>
                <div class="mt-10 flex justify-center lg:justify-start items-center space-x-4">
                    <a href="https://cal.com/thearch/meet-the-arch" target="_blank" rel="noopener noreferrer" class="bg-white text-gray-900 font-semibold py-3 px-8 rounded-lg animated-button" data-lang-key="hero_cta1">
                        Planifier un appel
                    </a>
                    <a href="https://tally.so/r/3q1rOg" target="_blank" rel="noopener noreferrer" class="border border-white/50 text-white font-semibold py-3 px-8 rounded-lg btn-secondary-animated" data-lang-key="hero_cta2">
                        Nous écrire
                    </a>
                </div>
            </div>
        </div>
    </section>

    <script>
        function debugHero() {
            const info = document.getElementById('debug-info');
            const heroSection = document.getElementById('hero-section');
            const heroContent = document.querySelector('.hero-content');
            const heroTitle = document.getElementById('hero-title');
            const heroSubtitle = document.querySelector('[data-lang-key="hero_subtitle"]');
            
            let status = [];
            
            // Check if elements exist
            status.push(`Hero Section: ${heroSection ? '✅' : '❌'}`);
            status.push(`Hero Content: ${heroContent ? '✅' : '❌'}`);
            status.push(`Hero Title: ${heroTitle ? '✅' : '❌'}`);
            status.push(`Hero Subtitle: ${heroSubtitle ? '✅' : '❌'}`);
            
            // Check computed styles
            if (heroContent) {
                const styles = window.getComputedStyle(heroContent);
                status.push(`Z-index: ${styles.zIndex}`);
                status.push(`Position: ${styles.position}`);
                status.push(`Display: ${styles.display}`);
                status.push(`Visibility: ${styles.visibility}`);
                status.push(`Opacity: ${styles.opacity}`);
            }
            
            // Check if text is visible
            if (heroTitle) {
                status.push(`Title text: "${heroTitle.textContent}"`);
                status.push(`Title visible: ${heroTitle.offsetHeight > 0 ? '✅' : '❌'}`);
            }
            
            if (heroSubtitle) {
                status.push(`Subtitle text: "${heroSubtitle.textContent}"`);
                status.push(`Subtitle visible: ${heroSubtitle.offsetHeight > 0 ? '✅' : '❌'}`);
            }
            
            document.getElementById('hero-status').innerHTML = status.join('<br>');
            
            // Highlight elements for debugging
            if (heroContent) heroContent.classList.add('debug-highlight');
        }
        
        // Run debug on load
        window.addEventListener('load', () => {
            setTimeout(debugHero, 1000);
        });
        
        // Run debug every 2 seconds
        setInterval(debugHero, 2000);
    </script>
</body>
</html>
