<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cross-Browser 3D Test - The Arch Landing</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: #0A0F19;
            color: white;
        }
        .test-container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        .browser-test {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .test-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .status {
            padding: 8px;
            margin: 8px 0;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .warning { background: #fff3cd; color: #856404; }
        .info { background: #d1ecf1; color: #0c5460; }
        .hero-section {
            height: 300px;
            position: relative;
            background: linear-gradient(135deg, #0A0F19 0%, #111827 100%);
            margin: 20px 0;
            border-radius: 10px;
            overflow: hidden;
        }
        #hero-canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .controls {
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        button {
            background: #8A70D6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover { background: #7B5FD6; }
        button:disabled { background: #666; cursor: not-allowed; }
        .log {
            background: #000;
            color: #0f0;
            padding: 15px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            margin-top: 20px;
        }
        .browser-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🌐 Cross-Browser 3D Scene Test</h1>
        
        <div class="browser-info">
            <div class="test-card">
                <h3>Browser Detection</h3>
                <div id="browser-details"></div>
            </div>
            <div class="test-card">
                <h3>WebGL Support</h3>
                <div id="webgl-details"></div>
            </div>
            <div class="test-card">
                <h3>Three.js Status</h3>
                <div id="threejs-details"></div>
            </div>
            <div class="test-card">
                <h3>Device Capabilities</h3>
                <div id="device-details"></div>
            </div>
        </div>
        
        <div class="hero-section">
            <div id="hero-canvas-container">
                <canvas id="hero-canvas"></canvas>
            </div>
        </div>
        
        <div class="browser-test">
            <div class="test-card">
                <h3>Chrome/Chromium Tests</h3>
                <div id="chrome-tests"></div>
            </div>
            <div class="test-card">
                <h3>Firefox Tests</h3>
                <div id="firefox-tests"></div>
            </div>
            <div class="test-card">
                <h3>Safari Tests</h3>
                <div id="safari-tests"></div>
            </div>
            <div class="test-card">
                <h3>Edge Tests</h3>
                <div id="edge-tests"></div>
            </div>
        </div>
        
        <div class="controls">
            <button onclick="runAllTests()">Run All Tests</button>
            <button onclick="testWebGL()">Test WebGL</button>
            <button onclick="testThreeJS()">Test Three.js</button>
            <button onclick="test3DScene()">Test 3D Scene</button>
            <button onclick="testSimplifiedScene()">Test Simplified Scene</button>
            <button onclick="clearLog()">Clear Log</button>
        </div>
        
        <div id="log" class="log"></div>
    </div>

    <!-- Load Three.js with fallback -->
    <script>
        // Load Three.js with fallback
        function loadThreeJS() {
            return new Promise((resolve, reject) => {
                if (typeof THREE !== 'undefined') {
                    resolve(THREE);
                    return;
                }
                
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
                script.onload = () => {
                    log('✅ Three.js loaded successfully');
                    resolve(THREE);
                };
                script.onerror = () => {
                    log('❌ Failed to load Three.js from CDN');
                    reject(new Error('Three.js failed to load'));
                };
                document.head.appendChild(script);
            });
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="assets/js/modules/three-scene.js"></script>
    
    <script>
        let logElement = document.getElementById('log');
        let testResults = {};
        
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logMessage = `[${timestamp}] ${message}\n`;
            logElement.textContent += logMessage;
            logElement.scrollTop = logElement.scrollHeight;
            console.log(message);
        }
        
        function clearLog() {
            logElement.textContent = '';
            testResults = {};
        }
        
        function addStatus(containerId, message, type = 'info') {
            const container = document.getElementById(containerId);
            const status = document.createElement('div');
            status.className = `status ${type}`;
            status.textContent = message;
            container.appendChild(status);
        }
        
        function detectBrowser() {
            const ua = navigator.userAgent;
            let browser = 'Unknown';
            let version = 'Unknown';
            
            if (ua.includes('Chrome') && !ua.includes('Edg')) {
                browser = 'Chrome';
                version = ua.match(/Chrome\/(\d+)/)?.[1] || 'Unknown';
            } else if (ua.includes('Firefox')) {
                browser = 'Firefox';
                version = ua.match(/Firefox\/(\d+)/)?.[1] || 'Unknown';
            } else if (ua.includes('Safari') && !ua.includes('Chrome')) {
                browser = 'Safari';
                version = ua.match(/Version\/(\d+)/)?.[1] || 'Unknown';
            } else if (ua.includes('Edg')) {
                browser = 'Edge';
                version = ua.match(/Edg\/(\d+)/)?.[1] || 'Unknown';
            } else if (ua.includes('Brave')) {
                browser = 'Brave';
                version = 'Chromium-based';
            }
            
            return { browser, version, userAgent: ua };
        }
        
        function checkWebGLSupport() {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            
            if (!gl) {
                return {
                    supported: false,
                    version: null,
                    vendor: null,
                    renderer: null,
                    extensions: []
                };
            }
            
            return {
                supported: true,
                version: gl.getParameter(gl.VERSION),
                vendor: gl.getParameter(gl.VENDOR),
                renderer: gl.getParameter(gl.RENDERER),
                extensions: gl.getSupportedExtensions() || []
            };
        }
        
        function checkThreeJS() {
            return {
                loaded: typeof THREE !== 'undefined',
                version: typeof THREE !== 'undefined' ? THREE.REVISION : null,
                WebGLRenderer: typeof THREE !== 'undefined' ? typeof THREE.WebGLRenderer : false,
                Scene: typeof THREE !== 'undefined' ? typeof THREE.Scene : false,
                PerspectiveCamera: typeof THREE !== 'undefined' ? typeof THREE.PerspectiveCamera : false
            };
        }
        
        function checkDeviceCapabilities() {
            return {
                hardwareConcurrency: navigator.hardwareConcurrency || 'Unknown',
                deviceMemory: navigator.deviceMemory || 'Unknown',
                maxTouchPoints: navigator.maxTouchPoints || 0,
                screenWidth: screen.width,
                screenHeight: screen.height,
                windowWidth: window.innerWidth,
                windowHeight: window.innerHeight,
                devicePixelRatio: window.devicePixelRatio || 1,
                isMobile: window.innerWidth < 768,
                isLowEndDevice: navigator.hardwareConcurrency && navigator.hardwareConcurrency < 2
            };
        }
        
        function runBrowserSpecificTests() {
            const browser = detectBrowser();
            
            // Chrome/Chromium tests
            if (browser.browser === 'Chrome' || browser.browser === 'Brave') {
                addStatus('chrome-tests', `Testing ${browser.browser} v${browser.version}`, 'info');
                
                // Test WebGL context creation
                try {
                    const canvas = document.createElement('canvas');
                    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
                    if (gl) {
                        addStatus('chrome-tests', 'WebGL2/WebGL context creation: ✅', 'success');
                    } else {
                        addStatus('chrome-tests', 'WebGL context creation: ❌', 'error');
                    }
                } catch (e) {
                    addStatus('chrome-tests', `WebGL context creation: ❌ (${e.message})`, 'error');
                }
                
                // Test Three.js compatibility
                if (typeof THREE !== 'undefined') {
                    try {
                        const scene = new THREE.Scene();
                        const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
                        const renderer = new THREE.WebGLRenderer({ antialias: true });
                        addStatus('chrome-tests', 'Three.js basic objects: ✅', 'success');
                    } catch (e) {
                        addStatus('chrome-tests', `Three.js basic objects: ❌ (${e.message})`, 'error');
                    }
                }
            }
            
            // Firefox tests
            if (browser.browser === 'Firefox') {
                addStatus('firefox-tests', `Testing ${browser.browser} v${browser.version}`, 'info');
                
                // Firefox-specific WebGL issues
                try {
                    const canvas = document.createElement('canvas');
                    const gl = canvas.getContext('webgl');
                    if (gl) {
                        addStatus('firefox-tests', 'WebGL context creation: ✅', 'success');
                        
                        // Check for Firefox-specific WebGL limitations
                        const maxTextureSize = gl.getParameter(gl.MAX_TEXTURE_SIZE);
                        const maxVertexAttribs = gl.getParameter(gl.MAX_VERTEX_ATTRIBS);
                        addStatus('firefox-tests', `Max texture size: ${maxTextureSize}`, 'info');
                        addStatus('firefox-tests', `Max vertex attribs: ${maxVertexAttribs}`, 'info');
                    } else {
                        addStatus('firefox-tests', 'WebGL context creation: ❌', 'error');
                    }
                } catch (e) {
                    addStatus('firefox-tests', `WebGL context creation: ❌ (${e.message})`, 'error');
                }
            }
            
            // Safari tests
            if (browser.browser === 'Safari') {
                addStatus('safari-tests', `Testing ${browser.browser} v${browser.version}`, 'info');
                
                // Safari-specific WebGL issues
                try {
                    const canvas = document.createElement('canvas');
                    const gl = canvas.getContext('webgl');
                    if (gl) {
                        addStatus('safari-tests', 'WebGL context creation: ✅', 'success');
                        
                        // Check for Safari-specific limitations
                        const maxTextureSize = gl.getParameter(gl.MAX_TEXTURE_SIZE);
                        addStatus('safari-tests', `Max texture size: ${maxTextureSize}`, 'info');
                    } else {
                        addStatus('safari-tests', 'WebGL context creation: ❌', 'error');
                    }
                } catch (e) {
                    addStatus('safari-tests', `WebGL context creation: ❌ (${e.message})`, 'error');
                }
            }
            
            // Edge tests
            if (browser.browser === 'Edge') {
                addStatus('edge-tests', `Testing ${browser.browser} v${browser.version}`, 'info');
                
                // Edge-specific tests
                try {
                    const canvas = document.createElement('canvas');
                    const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
                    if (gl) {
                        addStatus('edge-tests', 'WebGL2/WebGL context creation: ✅', 'success');
                    } else {
                        addStatus('edge-tests', 'WebGL context creation: ❌', 'error');
                    }
                } catch (e) {
                    addStatus('edge-tests', `WebGL context creation: ❌ (${e.message})`, 'error');
                }
            }
        }
        
        function testWebGL() {
            log('Testing WebGL support...');
            const webgl = checkWebGLSupport();
            
            if (webgl.supported) {
                log(`✅ WebGL supported: ${webgl.version}`, 'success');
                log(`Vendor: ${webgl.vendor}`, 'info');
                log(`Renderer: ${webgl.renderer}`, 'info');
                log(`Extensions: ${webgl.extensions.length} available`, 'info');
            } else {
                log('❌ WebGL not supported', 'error');
            }
            
            // Update UI
            document.getElementById('webgl-details').innerHTML = '';
            addStatus('webgl-details', webgl.supported ? '✅ Supported' : '❌ Not Supported', webgl.supported ? 'success' : 'error');
            if (webgl.supported) {
                addStatus('webgl-details', `Version: ${webgl.version}`, 'info');
                addStatus('webgl-details', `Vendor: ${webgl.vendor}`, 'info');
            }
        }
        
        function testThreeJS() {
            log('Testing Three.js...');
            const threejs = checkThreeJS();
            
            if (threejs.loaded) {
                log(`✅ Three.js loaded: r${threejs.version}`, 'success');
                log(`WebGLRenderer: ${threejs.WebGLRenderer ? '✅' : '❌'}`, threejs.WebGLRenderer ? 'success' : 'error');
                log(`Scene: ${threejs.Scene ? '✅' : '❌'}`, threejs.Scene ? 'success' : 'error');
                log(`PerspectiveCamera: ${threejs.PerspectiveCamera ? '✅' : '❌'}`, threejs.PerspectiveCamera ? 'success' : 'error');
            } else {
                log('❌ Three.js not loaded', 'error');
            }
            
            // Update UI
            document.getElementById('threejs-details').innerHTML = '';
            addStatus('threejs-details', threejs.loaded ? '✅ Loaded' : '❌ Not Loaded', threejs.loaded ? 'success' : 'error');
            if (threejs.loaded) {
                addStatus('threejs-details', `Version: r${threejs.version}`, 'info');
            }
        }
        
        function test3DScene() {
            log('Testing 3D scene initialization...');
            
            if (typeof THREE === 'undefined') {
                log('❌ Three.js not available', 'error');
                return;
            }
            
            try {
                if (window.threeSceneManager) {
                    window.threeSceneManager.destroy();
                }
                
                // Force 3D scene initialization
                const heroContainer = document.getElementById('hero-canvas-container');
                if (!heroContainer) {
                    log('❌ Hero container not found', 'error');
                    return;
                }
                
                // Create a new scene manager
                window.threeSceneManager = new window.ThreeSceneManager();
                log('✅ 3D scene initialized', 'success');
                
            } catch (error) {
                log(`❌ 3D scene failed: ${error.message}`, 'error');
                console.error('3D scene error:', error);
            }
        }
        
        function testSimplifiedScene() {
            log('Testing simplified scene...');
            
            if (window.threeSceneManager) {
                window.threeSceneManager.setupSimplifiedScene();
                log('✅ Simplified scene activated', 'success');
            } else {
                log('❌ ThreeSceneManager not available', 'error');
            }
        }
        
        function runAllTests() {
            log('Running comprehensive cross-browser tests...');
            
            // Clear previous results
            ['browser-details', 'webgl-details', 'threejs-details', 'device-details', 
             'chrome-tests', 'firefox-tests', 'safari-tests', 'edge-tests'].forEach(id => {
                document.getElementById(id).innerHTML = '';
            });
            
            // Run all tests
            const browser = detectBrowser();
            const webgl = checkWebGLSupport();
            const threejs = checkThreeJS();
            const device = checkDeviceCapabilities();
            
            // Update browser info
            addStatus('browser-details', `Browser: ${browser.browser}`, 'info');
            addStatus('browser-details', `Version: ${browser.version}`, 'info');
            addStatus('browser-details', `User Agent: ${browser.userAgent.substring(0, 50)}...`, 'info');
            
            // Update device info
            addStatus('device-details', `Hardware Concurrency: ${device.hardwareConcurrency}`, 'info');
            addStatus('device-details', `Device Memory: ${device.deviceMemory}GB`, 'info');
            addStatus('device-details', `Screen: ${device.screenWidth}x${device.screenHeight}`, 'info');
            addStatus('device-details', `Window: ${device.windowWidth}x${device.windowHeight}`, 'info');
            addStatus('device-details', `Pixel Ratio: ${device.devicePixelRatio}`, 'info');
            addStatus('device-details', `Mobile: ${device.isMobile ? 'Yes' : 'No'}`, device.isMobile ? 'warning' : 'success');
            
            // Run browser-specific tests
            runBrowserSpecificTests();
            
            // Test WebGL and Three.js
            testWebGL();
            testThreeJS();
            
            log('All tests completed!');
        }
        
        // Initialize on page load
        window.addEventListener('load', () => {
            log('Cross-browser test tool initialized');
            runAllTests();
        });
        
        // Override console.log to capture Three.js logs
        const originalConsoleLog = console.log;
        console.log = function(...args) {
            originalConsoleLog.apply(console, args);
            if (args[0] && typeof args[0] === 'string' && 
                (args[0].includes('3D') || args[0].includes('WebGL') || args[0].includes('Three'))) {
                log(args.join(' '), 'info');
            }
        };
    </script>
</body>
</html>
