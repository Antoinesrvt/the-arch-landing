<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Scene Debug - The Arch Landing</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: #0A0F19;
            color: white;
        }
        .debug-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            font-weight: bold;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .warning { background: #fff3cd; color: #856404; }
        .info { background: #d1ecf1; color: #0c5460; }
        .hero-section {
            height: 400px;
            position: relative;
            background: linear-gradient(135deg, #0A0F19 0%, #111827 100%);
            margin: 20px 0;
            border-radius: 10px;
            overflow: hidden;
        }
        #hero-canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .controls {
            margin: 20px 0;
        }
        button {
            background: #8A70D6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #7B5FD6;
        }
        .log {
            background: #000;
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="debug-container">
        <h1>🔧 3D Scene Debug Tool</h1>
        
        <div id="device-info"></div>
        
        <div class="hero-section">
            <div id="hero-canvas-container">
                <canvas id="hero-canvas"></canvas>
            </div>
        </div>
        
        <div class="controls">
            <button onclick="test3DScene()">Test 3D Scene</button>
            <button onclick="testSimplifiedScene()">Test Simplified Scene</button>
            <button onclick="checkWebGL()">Check WebGL Support</button>
            <button onclick="clearLog()">Clear Log</button>
        </div>
        
        <div id="log" class="log"></div>
    </div>

    <!-- Load Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="assets/js/modules/three-scene.js"></script>
    
    <script>
        let logElement = document.getElementById('log');
        
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logMessage = `[${timestamp}] ${message}\n`;
            logElement.textContent += logMessage;
            logElement.scrollTop = logElement.scrollHeight;
            console.log(message);
        }
        
        function clearLog() {
            logElement.textContent = '';
        }
        
        function checkDeviceInfo() {
            const deviceInfo = document.getElementById('device-info');
            const info = {
                userAgent: navigator.userAgent,
                screenWidth: window.screen.width,
                screenHeight: window.screen.height,
                windowWidth: window.innerWidth,
                windowHeight: window.innerHeight,
                devicePixelRatio: window.devicePixelRatio,
                hardwareConcurrency: navigator.hardwareConcurrency,
                maxTouchPoints: navigator.maxTouchPoints,
                isMobile: window.innerWidth < 768,
                isLowEndDevice: navigator.hardwareConcurrency && navigator.hardwareConcurrency < 2,
                isOldBrowser: !window.requestAnimationFrame || !window.IntersectionObserver
            };
            
            let html = '<h2>Device Information</h2>';
            for (const [key, value] of Object.entries(info)) {
                const statusClass = typeof value === 'boolean' ? (value ? 'warning' : 'success') : 'info';
                html += `<div class="status ${statusClass}"><strong>${key}:</strong> ${value}</div>`;
            }
            deviceInfo.innerHTML = html;
        }
        
        function checkWebGL() {
            log('Checking WebGL support...');
            
            if (typeof THREE === 'undefined') {
                log('❌ Three.js not loaded', 'error');
                return;
            }
            
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                
                if (gl) {
                    log('✅ WebGL is supported', 'success');
                    log(`WebGL Version: ${gl.getParameter(gl.VERSION)}`, 'info');
                    log(`WebGL Vendor: ${gl.getParameter(gl.VENDOR)}`, 'info');
                    log(`WebGL Renderer: ${gl.getParameter(gl.RENDERER)}`, 'info');
                } else {
                    log('❌ WebGL is not supported', 'error');
                }
            } catch (error) {
                log(`❌ WebGL check failed: ${error.message}`, 'error');
            }
        }
        
        function test3DScene() {
            log('Testing 3D scene initialization...');
            
            if (typeof THREE === 'undefined') {
                log('❌ Three.js not loaded', 'error');
                return;
            }
            
            try {
                // Force 3D scene initialization
                if (window.threeSceneManager) {
                    window.threeSceneManager.destroy();
                }
                
                // Override mobile detection for testing
                const originalInit = window.ThreeSceneManager.prototype.init;
                window.ThreeSceneManager.prototype.init = function() {
                    log('Initializing 3D scene (forced)...');
                    
                    const heroContainer = document.getElementById('hero-canvas-container');
                    if (!heroContainer) {
                        log('❌ Hero container not found', 'error');
                        return;
                    }
                    
                    try {
                        this.setupScene(heroContainer);
                        this.setupCamera(heroContainer);
                        this.setupRenderer(heroContainer);
                        this.setupLights();
                        this.createArchGroup();
                        this.createParticles();
                        this.setupEventListeners();
                        this.animate();
                        log('✅ 3D scene initialized successfully', 'success');
                    } catch (error) {
                        log(`❌ 3D scene initialization failed: ${error.message}`, 'error');
                        this.setupSimplifiedScene();
                    }
                };
                
                window.threeSceneManager = new window.ThreeSceneManager();
                
                // Restore original init method
                setTimeout(() => {
                    window.ThreeSceneManager.prototype.init = originalInit;
                }, 1000);
                
            } catch (error) {
                log(`❌ Test failed: ${error.message}`, 'error');
            }
        }
        
        function testSimplifiedScene() {
            log('Testing simplified scene...');
            
            if (window.threeSceneManager) {
                window.threeSceneManager.setupSimplifiedScene();
                log('✅ Simplified scene activated', 'success');
            } else {
                log('❌ ThreeSceneManager not available', 'error');
            }
        }
        
        // Initialize on page load
        window.addEventListener('load', () => {
            checkDeviceInfo();
            log('Debug tool initialized');
            log('Click "Test 3D Scene" to test the 3D scene');
        });
        
        // Override console.log to capture Three.js logs
        const originalConsoleLog = console.log;
        console.log = function(...args) {
            originalConsoleLog.apply(console, args);
            if (args[0] && typeof args[0] === 'string' && args[0].includes('3D')) {
                log(args.join(' '), 'info');
            }
        };
    </script>
</body>
</html>
