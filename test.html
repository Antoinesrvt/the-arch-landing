<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - The Arch Landing</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>The Arch Landing Page - Test</h1>
    
    <div class="test-section">
        <h2>File Structure Test</h2>
        <p id="structure-test">Testing file structure...</p>
    </div>
    
    <div class="test-section">
        <h2>CSS Loading Test</h2>
        <p id="css-test">Testing CSS files...</p>
    </div>
    
    <div class="test-section">
        <h2>JavaScript Loading Test</h2>
        <p id="js-test">Testing JavaScript files...</p>
    </div>
    
    <script>
        // Test file structure
        const files = [
            'index.html',
            'assets/css/main.css',
            'assets/css/components.css',
            'assets/css/animations.css',
            'assets/js/main.js',
            'assets/js/data/translations.js',
            'assets/js/data/case-studies.js',
            'assets/js/modules/translations.js',
            'assets/js/modules/animations.js',
            'assets/js/modules/three-scene.js',
            'assets/js/modules/modal.js'
        ];
        
        let structureOk = true;
        files.forEach(file => {
            fetch(file)
                .then(response => {
                    if (!response.ok) {
                        structureOk = false;
                        document.getElementById('structure-test').innerHTML = 
                            `<span class="error">❌ File ${file} not found</span>`;
                    }
                })
                .catch(() => {
                    structureOk = false;
                    document.getElementById('structure-test').innerHTML = 
                        `<span class="error">❌ Error loading ${file}</span>`;
                });
        });
        
        if (structureOk) {
            document.getElementById('structure-test').innerHTML = 
                '<span class="success">✅ All files found</span>';
        }
        
        // Test CSS loading
        const testDiv = document.createElement('div');
        testDiv.className = 'glass-card';
        testDiv.style.position = 'absolute';
        testDiv.style.left = '-9999px';
        document.body.appendChild(testDiv);
        
        const computedStyle = window.getComputedStyle(testDiv);
        const hasBackdropFilter = computedStyle.backdropFilter !== 'none' || 
                                 computedStyle.webkitBackdropFilter !== 'none';
        
        document.getElementById('css-test').innerHTML = hasBackdropFilter ? 
            '<span class="success">✅ CSS loaded successfully</span>' :
            '<span class="error">❌ CSS not loading properly</span>';
        
        // Test JavaScript loading
        setTimeout(() => {
            const jsLoaded = typeof window.TranslationsData !== 'undefined' && 
                           typeof window.CaseStudiesData !== 'undefined';
            
            document.getElementById('js-test').innerHTML = jsLoaded ? 
                '<span class="success">✅ JavaScript loaded successfully</span>' :
                '<span class="error">❌ JavaScript not loading properly</span>';
        }, 1000);
    </script>
</body>
</html>
